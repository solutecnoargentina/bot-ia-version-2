<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solutecno SaaS</title>

<style>
*{
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#0f172a;
color:white;
}

.hidden{
display:none !important;
}

.login-screen{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.35);
}

.login-box h2{
margin-top:0;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#error{
color:#f87171;
margin-top:10px;
min-height:20px;
}

header{
background:#111827;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #334155;
}

header h1{
margin:0;
font-size:22px;
}

header button{
width:auto;
padding:10px 14px;
}

.main{
padding:20px;
}

.card{
background:#1e293b;
border-radius:10px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,0.20);
}

.card h2{
margin-top:0;
}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>Solutecno Admin</h2>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>

    <div id="error"></div>
  </div>
</div>

<div id="panelScreen" class="hidden">
  <header>
    <h1>Panel Administrador Solutecno</h1>
    <button onclick="logout()">Cerrar sesión</button>
  </header>

  <div class="main">
<div class="card">
<h2>Agentes</h2>

<input id="agentName" placeholder="Nombre del agente">
<textarea id="agentPrompt" placeholder="Prompt del agente" style="width:100%;height:80px;margin-top:10px;"></textarea>

<button onclick="createAgent()">Crear agente</button>

<div id="agentsList" style="margin-top:20px;"></div>
</div>
    <div class="card">
      <h2>Estado del sistema</h2>
      <p>Login administrador funcionando correctamente.</p>
      <p>Backend conectado al frontend.</p>
      <p>Base inicial del SaaS operativa.</p>
    </div>

    <div class="card">
      <h2>Siguiente módulo</h2>
      <p>En el próximo paso vamos a crear la sección de agentes.</p>
    </div>
  </div>
</div>

<script>
async function login(){
  const user = document.getElementById("user").value
  const pass = document.getElementById("pass").value
  const error = document.getElementById("error")

  error.innerText = ""

  const res = await fetch("/login",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({user,pass})
  })

  if(res.status === 200){
    document.getElementById("loginScreen").classList.add("hidden")
    document.getElementById("panelScreen").classList.remove("hidden")
    return
  }

  error.innerText = "Credenciales incorrectas"
}

function logout(){
  document.getElementById("panelScreen").classList.add("hidden")
  document.getElementById("loginScreen").classList.remove("hidden")
  document.getElementById("user").value = ""
  document.getElementById("pass").value = ""
  document.getElementById("error").innerText = ""
}
async function loadAgents(){
  const res = await fetch("/agents")
  const agents = await res.json()

  const container = document.getElementById("agentsList")
  container.innerHTML = ""

  agents.forEach(a=>{
    const div = document.createElement("div")
    div.style.marginBottom = "10px"

    div.innerHTML = `
      <b>${a.name}</b><br>
      <small>${a.prompt}</small><br>
      <button onclick="deleteAgent(${a.id})">Eliminar</button>
    `

    container.appendChild(div)
  })
}

async function createAgent(){
  const name = document.getElementById("agentName").value
  const prompt = document.getElementById("agentPrompt").value

  await fetch("/agents",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({name,prompt})
  })

  document.getElementById("agentName").value = ""
  document.getElementById("agentPrompt").value = ""

  loadAgents()
}

async function deleteAgent(id){
  await fetch("/agents/"+id,{
    method:"DELETE"
  })

  loadAgents()
}

setTimeout(loadAgents,500)
</script>

</body>
</html>
