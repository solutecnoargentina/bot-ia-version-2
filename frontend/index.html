<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Solutecno SaaS</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#error{
color:red;
margin-top:10px;
}
</style>

</head>

<body>

<div class="login-box">
<h2>Solutecno Admin</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<div id="error"></div>
</div>

<script>
async function login(){

const user = document.getElementById("user").value
const pass = document.getElementById("pass").value

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({user,pass})
})

if(res.status === 200){
alert("Login correcto")
}else{
document.getElementById("error").innerText = "Credenciales incorrectas"
}

}
</script>

</body>
</html>
